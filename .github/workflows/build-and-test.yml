name: Go
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sim

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v ./cmd/duel-masters
      - name: Test with the Go CLI
        run: go test ./tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sim

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install dependencies
        run: go mod download
      - name: Test with the Go CLI
        run: go test ./tests
